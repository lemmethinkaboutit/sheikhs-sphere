<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Change Management 90% Therapy</title>
<style>.bg{fill:#1a1a2e}.t-w{fill:#fff;font-family:monospace}.t-t{fill:#00c9a7;font-family:monospace}.t-d{fill:#8892a4;font-family:monospace}.t-r{fill:#e94560;font-family:monospace}.t-y{fill:#f5a623;font-family:monospace}</style>
<rect width="680" height="420" class="bg"/>
<text x="340" y="36" class="t-t" font-size="15" font-weight="bold" text-anchor="middle">Why People Resist Change</text>
<text x="340" y="54" class="t-d" font-size="10" text-anchor="middle">It is never really about the technology.</text>
<rect x="40" y="80" width="240" height="180" rx="10" fill="#0f3460" stroke="#00c9a7" stroke-width="2"/>
<text x="160" y="140" class="t-t" font-size="64" font-weight="bold" text-anchor="middle">90%</text>
<text x="160" y="168" class="t-w" font-size="14" font-weight="bold" text-anchor="middle">People</text>
<text x="160" y="188" class="t-d" font-size="10" text-anchor="middle">Identity · Fear · Trust · Discomfort</text>
<text x="160" y="205" class="t-d" font-size="10" text-anchor="middle">Therapy. Relationship. Patience.</text>
<text x="160" y="240" class="t-d" font-size="10" text-anchor="middle">This is the real work.</text>
<rect x="40" y="272" width="240" height="70" rx="10" fill="#16213e" stroke="#f5a623" stroke-width="2"/>
<text x="160" y="308" class="t-y" font-size="36" font-weight="bold" text-anchor="middle">10%</text>
<text x="160" y="330" class="t-d" font-size="10" text-anchor="middle">Technology · Platform · Config</text>
<rect x="300" y="80" width="340" height="50" rx="6" fill="#4c0519" stroke="#e94560" stroke-width="1.5"/>
<text x="315" y="100" class="t-r" font-size="11" font-weight="bold">Identity</text>
<text x="315" y="118" class="t-d" font-size="9">If this tool does my job — what exactly am I for?</text>
<rect x="300" y="140" width="340" height="50" rx="6" fill="#3d2b00" stroke="#f5a623" stroke-width="1.5"/>
<text x="315" y="160" class="t-y" font-size="11" font-weight="bold">Fear</text>
<text x="315" y="178" class="t-d" font-size="9">Being a beginner again after years of competence</text>
<rect x="300" y="200" width="340" height="50" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1.5"/>
<text x="315" y="220" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold">Trust</text>
<text x="315" y="238" class="t-d" font-size="9">Do I trust the person pushing this change?</text>
<rect x="300" y="260" width="340" height="50" rx="6" fill="#3d1a5f" stroke="#a78bfa" stroke-width="1.5"/>
<text x="315" y="280" fill="#a78bfa" font-family="monospace" font-size="11" font-weight="bold">Discomfort</text>
<text x="315" y="298" class="t-d" font-size="9">Unfamiliar feels unsafe — at least at first</text>
<rect x="300" y="322" width="340" height="62" rx="6" fill="#064e3b" stroke="#00c9a7" stroke-width="1.5"/>
<text x="470" y="344" class="t-t" font-size="11" font-weight="bold" text-anchor="middle">What actually works</text>
<text x="470" y="362" class="t-d" font-size="9" text-anchor="middle">Make people feel valued inside the change —</text>
<text x="470" y="376" class="t-d" font-size="9" text-anchor="middle">not subject to it.</text>
<text x="340" y="408" fill="#00c9a7" font-family="monospace" font-size="11" text-anchor="middle">You are not implementing a platform. You are changing how people think about work.</text>
</svg>
