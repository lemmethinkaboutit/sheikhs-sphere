<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SPM Demand Intake</title>
<style>.bg{fill:#1a1a2e}.t-w{fill:#fff;font-family:monospace}.t-t{fill:#00c9a7;font-family:monospace}.t-d{fill:#8892a4;font-family:monospace}.t-r{fill:#e94560;font-family:monospace}.t-y{fill:#f5a623;font-family:monospace}.t-p{fill:#a78bfa;font-family:monospace}</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<rect width="680" height="400" class="bg"/>
<text x="340" y="36" class="t-t" font-size="15" font-weight="bold" text-anchor="middle">Demand Intake — Ideas Becoming Managed Work</text>
<rect x="40" y="65" width="110" height="80" rx="8" fill="#0f3460" stroke="#a78bfa" stroke-width="1.5"/>
<text x="95" y="88" class="t-p" font-size="11" font-weight="bold" text-anchor="middle">IDEA</text>
<text x="95" y="106" class="t-d" font-size="9" text-anchor="middle">Anyone submits</text>
<text x="95" y="120" class="t-d" font-size="9" text-anchor="middle">a demand request</text>
<line x1="152" y1="105" x2="175" y2="105" stroke="#00c9a7" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<rect x="177" y="65" width="110" height="80" rx="8" fill="#0f3460" stroke="#60a5fa" stroke-width="1.5"/>
<text x="232" y="88" fill="#60a5fa" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">SCORE</text>
<text x="232" y="106" class="t-d" font-size="9" text-anchor="middle">Value vs effort</text>
<text x="232" y="120" class="t-d" font-size="9" text-anchor="middle">Risk assessed</text>
<line x1="289" y1="105" x2="312" y2="105" stroke="#00c9a7" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<rect x="314" y="65" width="110" height="80" rx="8" fill="#0f3460" stroke="#f5a623" stroke-width="1.5"/>
<text x="369" y="88" class="t-y" font-size="11" font-weight="bold" text-anchor="middle">DECIDE</text>
<text x="369" y="106" class="t-d" font-size="9" text-anchor="middle">Leadership reviews</text>
<text x="369" y="120" class="t-d" font-size="9" text-anchor="middle">Priority set</text>
<line x1="426" y1="90" x2="449" y2="90" stroke="#00c9a7" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<rect x="451" y="65" width="110" height="36" rx="8" fill="#064e3b" stroke="#00c9a7" stroke-width="1.5"/>
<text x="506" y="87" class="t-t" font-size="10" font-weight="bold" text-anchor="middle">PROJECT — approved</text>
<rect x="451" y="109" width="110" height="36" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="1.5"/>
<text x="506" y="127" class="t-r" font-size="10" font-weight="bold" text-anchor="middle">ARCHIVED — not lost</text>
<rect x="40" y="175" width="600" height="70" rx="8" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
<text x="340" y="200" class="t-t" font-size="12" font-weight="bold" text-anchor="middle">The part most organizations get wrong</text>
<text x="340" y="220" class="t-d" font-size="10" text-anchor="middle">Rejected ideas disappear. Nobody knows why or if circumstances changed.</text>
<text x="340" y="236" class="t-w" font-size="10" text-anchor="middle">SPM creates a record. An organizational memory. Worth more than the software.</text>
<rect x="40" y="265" width="290" height="100" rx="8" fill="#16213e" stroke="#a78bfa" stroke-width="1.5"/>
<text x="55" y="285" class="t-p" font-size="11" font-weight="bold">The manual version (my sprint)</text>
<text x="55" y="303" class="t-d" font-size="9">20 people write problems, vote on solutions</text>
<text x="55" y="318" class="t-d" font-size="9">Room decides what gets worked on next</text>
<text x="55" y="348" class="t-t" font-size="9">= demand intake, done manually</text>
<rect x="350" y="265" width="290" height="100" rx="8" fill="#16213e" stroke="#00c9a7" stroke-width="1.5"/>
<text x="365" y="285" class="t-t" font-size="11" font-weight="bold">The SPM version</text>
<text x="365" y="303" class="t-d" font-size="9">Anyone submits via platform, scored auto</text>
<text x="365" y="318" class="t-d" font-size="9">Dashboard shows priorities in real time</text>
<text x="365" y="348" class="t-t" font-size="9">= same thing, at scale</text>
</svg>
