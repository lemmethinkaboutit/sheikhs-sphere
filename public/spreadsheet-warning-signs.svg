<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Five signs your spreadsheet has outgrown itself</title>
<style>.bg{fill:#1a1a2e}.t-w{fill:#fff;font-family:monospace}.t-t{fill:#00c9a7;font-family:monospace}.t-d{fill:#8892a4;font-family:monospace}.t-r{fill:#e94560;font-family:monospace}.t-y{fill:#f5a623;font-family:monospace}.t-p{fill:#a78bfa;font-family:monospace}.n{fill:#e94560;font-family:monospace;font-weight:bold}</style>
<rect width="680" height="300" class="bg"/>
<text x="340" y="34" class="t-r" font-size="15" font-weight="bold" text-anchor="middle">5 Signs Your Spreadsheet Has Outgrown Itself</text>
<text x="340" y="54" class="t-d" font-size="10" text-anchor="middle">Two or three of these is usually enough.</text>

<rect x="28" y="72" width="624" height="38" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.2"/>
<text x="48" y="96" class="n" font-size="16">1</text>
<text x="72" y="91" class="t-w" font-size="11" font-weight="bold">Nobody trusts the numbers without asking a human</text>
<text x="72" y="105" class="t-d" font-size="9">"Are we on track?" → "let me check with Sarah," not "let me open the sheet."</text>

<rect x="28" y="116" width="624" height="38" rx="6" fill="#16213e" stroke="#f5a623" stroke-width="1.2"/>
<text x="48" y="140" class="t-y" font-size="16" font-weight="bold">2</text>
<text x="72" y="135" class="t-w" font-size="11" font-weight="bold">Updating it is someone's actual job</text>
<text x="72" y="149" class="t-d" font-size="9">The Friday-afternoon "clean up the tracker" ritual is the tool's cost, paid in salary.</text>

<rect x="28" y="160" width="624" height="38" rx="6" fill="#16213e" stroke="#a78bfa" stroke-width="1.2"/>
<text x="48" y="184" class="t-p" font-size="16" font-weight="bold">3</text>
<text x="72" y="179" class="t-w" font-size="11" font-weight="bold">The questions you can't answer are the important ones</text>
<text x="72" y="193" class="t-d" font-size="9">"Show me everything blocked by legal." A sheet answers columns, not questions across rows.</text>

<rect x="28" y="204" width="624" height="38" rx="6" fill="#16213e" stroke="#60a5fa" stroke-width="1.2"/>
<text x="48" y="228" fill="#60a5fa" font-family="monospace" font-size="16" font-weight="bold">4</text>
<text x="72" y="223" class="t-w" font-size="11" font-weight="bold">Two people made changes at the same time</text>
<text x="72" y="237" class="t-d" font-size="9">Now there are two versions, both called "final," and an argument about which is real.</text>

<rect x="28" y="248" width="624" height="38" rx="6" fill="#16213e" stroke="#00c9a7" stroke-width="1.2"/>
<text x="48" y="272" class="t-t" font-size="16" font-weight="bold">5</text>
<text x="72" y="267" class="t-w" font-size="11" font-weight="bold">The same status update gets typed three times</text>
<text x="72" y="281" class="t-d" font-size="9">Into the sheet, the email, the standup deck. That's not a workflow — it's a tax.</text>
</svg>
