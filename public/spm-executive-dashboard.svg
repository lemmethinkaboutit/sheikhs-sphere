<text x="505" y="118" class="t-r" font-size="22" font-weight="bold" text-anchor="middle">1</text>
<text x="505" y="134" class="t-d" font-size="9" text-anchor="middle">Over Budget</text>
<rect x="55" y="162" width="510" height="140" rx="6" fill="#16213e"/>
<text x="70" y="180" class="t-t" font-size="10">Project Comparison</text>
