<rect width="680" height="400" class="bg"/>
<text x="340" y="30" class="t-t" font-size="14" font-weight="bold" text-anchor="middle">SPM Executive Dashboard</text>
<text x="340" y="48" class="t-d" font-size="10" text-anchor="middle">They say they want data. They actually want to stop being surprised.</text>
<rect x="40" y="58" width="600" height="260" rx="10" fill="#0d1b2e" stroke="#00c9a7" stroke-width="1.5"/>
<rect x="40" y="58" width="600" height="28" rx="10" fill="#0f3460"/>
<rect x="40" y="74" width="600" height="12" fill="#0f3460"/>
<text x="60" y="76" class="t-t" font-size="10">Portfolio Overview — Q3 2025</text>
