<text x="115" y="118" class="t-t" font-size="22" font-weight="bold" text-anchor="middle">14</text>
<text x="115" y="134" class="t-d" font-size="9" text-anchor="middle">Active Projects</text>
<rect x="185" y="95" width="120" height="55" rx="6" fill="#16213e" stroke="#4ade80" stroke-width="1"/>
<text x="245" y="118" fill="#4ade80" font-family="monospace" font-size="22" font-weight="bold" text-anchor="middle">$2.4M</text>
<text x="245" y="134" class="t-d" font-size="9" text-anchor="middle">Expected Value</text>
