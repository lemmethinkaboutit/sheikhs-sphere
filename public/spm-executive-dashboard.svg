<text x="70" y="240" class="t-w" font-size="9">ERP Upgrade</text><text x="220" y="240" fill="#4ade80" font-family="monospace" font-size="9">$1.2M</text><text x="300" y="240" class="t-y" font-size="9">Medium</text><rect x="458" y="231" width="50" height="14" rx="3" fill="#3d2b00"/><text x="483" y="242" class="t-y" font-size="8" text-anchor="middle">At Risk</text>
<text x="70" y="260" class="t-w" font-size="9">Portal Redesign</text><text x="220" y="260" fill="#4ade80" font-family="monospace" font-size="9">$400K</text><text x="300" y="260" class="t-t" font-size="9">Low</text><rect x="458" y="251" width="50" height="14" rx="3" fill="#064e3b"/><text x="483" y="262" class="t-t" font-size="8" text-anchor="middle">On Track</text>
<text x="70" y="280" class="t-w" font-size="9">Legacy Sunset</text><text x="220" y="280" fill="#4ade80" font-family="monospace" font-size="9">$200K</text><text x="300" y="280" class="t-r" font-size="9">High</text><rect x="458" y="271" width="50" height="14" rx="3" fill="#4c0519"/><text x="483" y="282" class="t-r" font-size="8" text-anchor="middle">Over Budget</text>
<rect x="40" y="328" width="600" height="44" rx="6" fill="#064e3b" stroke="#00c9a7" stroke-width="1"/>
<text x="340" y="347" class="t-t" font-size="11" font-weight="bold" text-anchor="middle">Visible problems can be managed. Invisible ones cannot.</text>
<text x="340" y="363" class="t-d" font-size="9" text-anchor="middle">SPM gives leadership not just data — but the end of being surprised.</text>
<text x="340" y="392" fill="#00c9a7" font-family="monospace" font-size="11" text-anchor="middle">When it works, it works like a charm.</text>
