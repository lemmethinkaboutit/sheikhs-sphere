<svg width="100%" viewBox="0 0 680 410" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Spreadsheet to Workflow — Moving Without Breaking Your Team</title>
<style>.bg{fill:#1a1a2e}.t-w{fill:#fff;font-family:monospace}.t-t{fill:#00c9a7;font-family:monospace}.t-d{fill:#8892a4;font-family:monospace}.t-r{fill:#e94560;font-family:monospace}.t-y{fill:#f5a623;font-family:monospace}.t-p{fill:#a78bfa;font-family:monospace}.t-b{fill:#60a5fa;font-family:monospace}</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<rect width="680" height="410" class="bg"/>
<text x="340" y="34" class="t-t" font-size="15" font-weight="bold" text-anchor="middle">Spreadsheet → Workflow: Migrate Without Breaking the Team</text>

<rect x="28" y="60" width="146" height="78" rx="8" fill="#0f3460" stroke="#a78bfa" stroke-width="1.5"/>
<text x="101" y="84" class="t-p" font-size="11" font-weight="bold" text-anchor="middle">1 · MAP</text>
<text x="101" y="102" class="t-d" font-size="9" text-anchor="middle">Find the real process</text>
<text x="101" y="116" class="t-d" font-size="9" text-anchor="middle">hiding in the columns</text>
<line x1="176" y1="99" x2="198" y2="99" stroke="#00c9a7" stroke-width="2" marker-end="url(#arr)"/>

<rect x="200" y="60" width="146" height="78" rx="8" fill="#0f3460" stroke="#60a5fa" stroke-width="1.5"/>
<text x="273" y="84" class="t-b" font-size="11" font-weight="bold" text-anchor="middle">2 · SEPARATE</text>
<text x="273" y="102" class="t-d" font-size="9" text-anchor="middle">Records in one place,</text>
<text x="273" y="116" class="t-d" font-size="9" text-anchor="middle">the flow as its own thing</text>
<line x1="348" y1="99" x2="370" y2="99" stroke="#00c9a7" stroke-width="2" marker-end="url(#arr)"/>

<rect x="372" y="60" width="146" height="78" rx="8" fill="#0f3460" stroke="#f5a623" stroke-width="1.5"/>
<text x="445" y="84" class="t-y" font-size="11" font-weight="bold" text-anchor="middle">3 · INTAKE FIRST</text>
<text x="445" y="102" class="t-d" font-size="9" text-anchor="middle">Fix the front door</text>
<text x="445" y="116" class="t-d" font-size="9" text-anchor="middle">before the dashboard</text>
<line x1="520" y1="99" x2="542" y2="99" stroke="#00c9a7" stroke-width="2" marker-end="url(#arr)"/>

<rect x="544" y="60" width="108" height="78" rx="8" fill="#064e3b" stroke="#00c9a7" stroke-width="1.5"/>
<text x="598" y="84" class="t-t" font-size="11" font-weight="bold" text-anchor="middle">4 · RUN</text>
<text x="598" y="100" class="t-t" font-size="11" font-weight="bold" text-anchor="middle">PARALLEL</text>
<text x="598" y="120" class="t-d" font-size="9" text-anchor="middle">one full cycle</text>

<rect x="28" y="158" width="624" height="62" rx="8" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
<text x="340" y="182" class="t-t" font-size="12" font-weight="bold" text-anchor="middle">The trap most teams fall into</text>
<text x="340" y="202" class="t-w" font-size="10" text-anchor="middle">Jumping to a heavy platform too fast just gives the chaos a login screen. Map first.</text>

<rect x="28" y="240" width="300" height="142" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
<text x="178" y="264" class="t-r" font-size="12" font-weight="bold" text-anchor="middle">The spreadsheet</text>
<text x="48" y="290" class="t-d" font-size="9.5">• "Are we on track?" → ask a human</text>
<text x="48" y="310" class="t-d" font-size="9.5">• Updating it is someone's Friday job</text>
<text x="48" y="330" class="t-d" font-size="9.5">• Two people, two "final" versions</text>
<text x="48" y="350" class="t-d" font-size="9.5">• Same status typed in three places</text>
<text x="178" y="372" class="t-r" font-size="9.5" font-weight="bold" text-anchor="middle">free — until it costs you a launch</text>

<rect x="352" y="240" width="300" height="142" rx="8" fill="#16213e" stroke="#00c9a7" stroke-width="1.5"/>
<text x="502" y="264" class="t-t" font-size="12" font-weight="bold" text-anchor="middle">The workflow</text>
<text x="372" y="290" class="t-d" font-size="9.5">• Status lives once, shows everywhere</text>
<text x="372" y="310" class="t-d" font-size="9.5">• Routing &amp; approvals are automatic</text>
<text x="372" y="330" class="t-d" font-size="9.5">• One source of truth, no janitor</text>
<text x="372" y="350" class="t-d" font-size="9.5">• Leadership answers its own questions</text>
<text x="502" y="372" class="t-t" font-size="9.5" font-weight="bold" text-anchor="middle">serves the team, not the other way round</text>
</svg>
