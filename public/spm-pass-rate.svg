<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SPM 56% Pass Rate</title>
<style>.bg{fill:#1a1a2e}.t-w{fill:#fff;font-family:monospace}.t-t{fill:#00c9a7;font-family:monospace}.t-d{fill:#8892a4;font-family:monospace}.t-r{fill:#e94560;font-family:monospace}.t-y{fill:#f5a623;font-family:monospace}</style>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#00c9a7" stroke-width="1.5" stroke-linecap="round"/></marker></defs>
<rect width="680" height="400" class="bg"/>
<text x="340" y="36" class="t-t" font-size="15" font-weight="bold" text-anchor="middle">CIS-SPM Pass Rate — 56%</text>
<text x="340" y="54" class="t-d" font-size="10" text-anchor="middle">Most people study it like a software exam. It is not.</text>
<text x="170" y="175" fill="#e94560" font-family="monospace" font-size="80" font-weight="bold" text-anchor="middle">56%</text>
<text x="170" y="200" class="t-d" font-size="11" text-anchor="middle">average pass rate</text>
<line x1="310" y1="90" x2="310" y2="340" stroke="#0f3460" stroke-width="1.5"/>
<rect x="330" y="90" width="320" height="110" rx="8" fill="#4c0519" stroke="#e94560" stroke-width="1.5"/>
<text x="490" y="112" class="t-r" font-size="12" font-weight="bold" text-anchor="middle">Wrong approach</text>
<text x="490" y="132" class="t-d" font-size="10" text-anchor="middle">Memorize modules and navigation</text>
<text x="490" y="150" class="t-d" font-size="10" text-anchor="middle">Features in, answers out</text>
<text x="490" y="188" class="t-r" font-size="10" text-anchor="middle">Treats it like a tech cert. Fails.</text>
<line x1="490" y1="202" x2="490" y2="213" stroke="#00c9a7" stroke-width="2" fill="none" marker-end="url(#arr)"/>
<rect x="330" y="215" width="320" height="110" rx="8" fill="#064e3b" stroke="#00c9a7" stroke-width="1.5"/>
<text x="490" y="237" class="t-t" font-size="12" font-weight="bold" text-anchor="middle">Right approach</text>
<text x="490" y="257" class="t-d" font-size="10" text-anchor="middle">Understand money, people, time</text>
<text x="490" y="275" class="t-d" font-size="10" text-anchor="middle">Think like a strategist</text>
<text x="490" y="313" class="t-t" font-size="10" text-anchor="middle">Business discipline exam. Passes.</text>
<text x="340" y="370" fill="#00c9a7" font-family="monospace" font-size="11" text-anchor="middle">You are not learning ServiceNow. You are learning how orgs allocate scarce resources.</text>
</svg>
