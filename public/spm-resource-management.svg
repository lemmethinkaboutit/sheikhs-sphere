<svg width="100%" viewBox="0 0 680 400" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SPM Resource Management</title>
<style>.bg{fill:#1a1a2e}.t-w{fill:#fff;font-family:monospace}.t-t{fill:#00c9a7;font-family:monospace}.t-d{fill:#8892a4;font-family:monospace}.t-r{fill:#e94560;font-family:monospace}.t-y{fill:#f5a623;font-family:monospace}</style>
<rect width="680" height="400" class="bg"/>
<text x="340" y="36" class="t-t" font-size="15" font-weight="bold" text-anchor="middle">Resource Management — The Balance That Matters</text>
<line x1="340" y1="290" x2="340" y2="340" stroke="#00c9a7" stroke-width="3"/>
<polygon points="240,340 440,340 390,360 290,360" fill="#0f3460" stroke="#00c9a7" stroke-width="1.5"/>
<line x1="160" y1="200" x2="520" y2="200" stroke="#00c9a7" stroke-width="2.5"/>
<circle cx="340" cy="200" r="6" fill="#00c9a7"/>
<line x1="160" y1="200" x2="160" y2="240" stroke="#e94560" stroke-width="2"/>
<rect x="80" y="240" width="160" height="50" rx="8" fill="#4c0519" stroke="#e94560" stroke-width="1.5"/>
<text x="160" y="262" class="t-r" font-size="11" font-weight="bold" text-anchor="middle">OVERLOADED</text>
<text x="160" y="278" class="t-d" font-size="9" text-anchor="middle">120% allocation — Burnout incoming</text>
<circle cx="160" cy="155" r="20" fill="#f5d98b" stroke="#333" stroke-width="1.5"/>
<circle cx="153" cy="154" r="3" fill="white"/><circle cx="153" cy="154" r="1.5" fill="#333"/>
<circle cx="167" cy="154" r="3" fill="white"/><circle cx="167" cy="154" r="1.5" fill="#333"/>
<path d="M152 165 Q160 160 168 165" fill="none" stroke="#333" stroke-width="1.5"/>
<text x="160" y="128" class="t-r" font-size="9" text-anchor="middle">exhausted</text>
<line x1="520" y1="200" x2="520" y2="160" stroke="#f5a623" stroke-width="2"/>
<rect x="440" y="110" width="160" height="50" rx="8" fill="#3d2b00" stroke="#f5a623" stroke-width="1.5"/>
<text x="520" y="132" class="t-y" font-size="11" font-weight="bold" text-anchor="middle">UNDERLOADED</text>
<text x="520" y="148" class="t-d" font-size="9" text-anchor="middle">40% allocation — Disengaged</text>
<circle cx="520" cy="80" r="20" fill="#f5d98b" stroke="#333" stroke-width="1.5"/>
<circle cx="513" cy="79" r="3" fill="white"/><circle cx="514" cy="80" r="1.5" fill="#333"/>
<circle cx="527" cy="79" r="3" fill="white"/><circle cx="527" cy="80" r="1.5" fill="#333"/>
<path d="M513 91 Q520 96 527 91" fill="none" stroke="#333" stroke-width="1.5"/>
<text x="520" y="53" class="t-y" font-size="9" text-anchor="middle">bored...</text>
<rect x="280" y="300" width="120" height="30" rx="6" fill="#064e3b" stroke="#00c9a7" stroke-width="1.5"/>
<text x="340" y="320" class="t-t" font-size="10" font-weight="bold" text-anchor="middle">SPM finds balance</text>
<text x="340" y="378" fill="#00c9a7" font-family="monospace" font-size="11" text-anchor="middle">The platform makes both failure modes visible before they become crises.</text>
</svg>
